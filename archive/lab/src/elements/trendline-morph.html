<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1480, initial-scale=1" />
  <title>Element Showcase - Bankroll Trendline Morph Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050608;
      --bg-2: #0b0d12;
      --bg-card: rgba(13, 17, 25, 0.65);
      --bg-card-hover: rgba(20, 26, 38, 0.75);
      --border: rgba(255, 255, 255, 0.05);
      --border-strong: rgba(255, 255, 255, 0.15);
      --accent: #00F0FF;
      --accent-2: #00FF87;
      --accent-soft: rgba(0, 240, 255, 0.06);
      --accent-glow: rgba(0, 240, 255, 0.15);
      --accent-line: rgba(0, 240, 255, 0.35);
      --loss: #FF3B6B;
      --loss-soft: rgba(255, 59, 107, 0.08);
      --fg: #f3f4f6;
      --fg-muted: #8892b0;
      --fg-dim: #3a3f50;
      --sans: 'Inter', -apple-system, sans-serif;
      --display: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    body {
      margin: 0; padding: 40px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow-x: hidden;
    }
    .container { max-width: 1000px; width: 100%; text-align: center; z-index: 10; }
    h1 { font-family: var(--display); font-weight: 700; margin-bottom: 20px; letter-spacing: -0.02em; }
    .back-link { position: fixed; top: 20px; left: 20px; color: var(--fg-muted); text-decoration: none; font-family: var(--mono); font-size: 11px; text-transform: uppercase; z-index: 100; }
    .back-link:hover { color: var(--accent); }

    /* Chart Container CSS */
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      position: relative;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .chart-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }
    
    .ranges-tab-menu {
      display: flex;
      gap: 3px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      padding: 3px;
      border-radius: 8px;
    }
    .ranges-tab-btn {
      background: none; border: 0;
      color: var(--fg-muted);
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .ranges-tab-btn.active {
      background: var(--bg-2);
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .svg-container {
      width: 100%;
      height: 200px;
      position: relative;
    }
    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Interactive Dot Marker CSS */
    .chart-tooltip-dot {
      fill: var(--accent);
      stroke: #fff;
      stroke-width: 2.5px;
      filter: drop-shadow(0 0 6px var(--accent));
      cursor: pointer;
      transition: r 0.15s ease;
    }
    .chart-tooltip-dot:hover {
      r: 8px;
    }

    /* Floating Tooltip Panel */
    .chart-tooltip-bubble {
      position: absolute;
      background: var(--bg-2);
      border: 1px solid var(--accent-line);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 10.5px;
      pointer-events: none;
      display: none;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      transform: translate(-50%, -120%);
    }
    .chart-tooltip-bubble span {
      display: block;
      margin-bottom: 2px;
    }
    .chart-tooltip-bubble span.pnl {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <a href="../../elements.html" class="back-link">← Showcase Catalog</a>
  <div class="container">
    <h1>Bankroll Trendline Morph Chart</h1>
    <p style="color: var(--fg-muted); margin-bottom: 30px;">GSAP path-morphing transitions bankroll trends dynamically with zero redraw overhead.</p>
    
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Dynamic bankroll progression</span>
        <div class="ranges-tab-menu" id="timeframe-selector">
          <button class="ranges-tab-btn active" data-filter="all">Lifetime</button>
          <button class="ranges-tab-btn" data-filter="30d">30 Days</button>
          <button class="ranges-tab-btn" data-filter="7d">7 Days</button>
        </div>
      </div>

      <div class="svg-container">
        <!-- Tooltip Bubble -->
        <div class="chart-tooltip-bubble" id="chart-tooltip">
          <span class="date">May 30, 2026</span>
          <span class="pnl">+$388.85</span>
          <span style="opacity: 0.6;">ROI: 141.4%</span>
        </div>

        <svg id="trend-svg" width="940" height="200" viewBox="0 0 940 200" preserveAspectRatio="none">
          <defs>
            <linearGradient id="chart-gradient" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
            </linearGradient>
          </defs>
          
          <!-- Zero reference line -->
          <line x1="0" y1="160" x2="940" y2="160" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3,3" id="zero-baseline"/>
          
          <!-- Wave Morph Areas -->
          <path id="chart-area" d="" fill="url(#chart-gradient)" opacity="1"/>
          <path id="chart-path" d="" fill="none" stroke="var(--accent)" stroke-width="2.5" style="filter: drop-shadow(0 2px 8px var(--accent-glow));"/>
          
          <!-- Interaction Nodes Container -->
          <g id="chart-nodes"></g>
        </svg>
      </div>
    </div>
  </div>

  <script type="module">
    import gsap from 'gsap';

    // Mock trend coordinates
    const CHART_DATA = {
      all: [
        { date: 'Oct 2025', val: 0, roi: 0 },
        { date: 'Nov 2025', val: 20, roi: 15 },
        { date: 'Dec 2025', val: 8, roi: 8 },
        { date: 'Jan 2026', val: 52, roi: 35 },
        { date: 'Feb 2026', val: 42, roi: 24 },
        { date: 'Mar 2026', val: 120, roi: 68 },
        { date: 'Apr 2026', val: 98, roi: 45 },
        { date: 'May 10', val: 220, roi: 110 },
        { date: 'May 20', val: 185, roi: 92 },
        { date: 'May 25', val: 284, roi: 125 },
        { date: 'May 28', val: 260, roi: 112 },
        { date: 'May 30', val: 388.85, roi: 141.4 }
      ],
      '30d': [
        { date: 'May 2', val: 98, roi: 45 },
        { date: 'May 10', val: 220, roi: 110 },
        { date: 'May 15', val: 175, roi: 88 },
        { date: 'May 20', val: 185, roi: 92 },
        { date: 'May 25', val: 284, roi: 125 },
        { date: 'May 28', val: 260, roi: 112 },
        { date: 'May 30', val: 388.85, roi: 141.4 }
      ],
      '7d': [
        { date: 'May 25', val: 284, roi: 125 },
        { date: 'May 28', val: 260, roi: 112 },
        { date: 'May 30', val: 388.85, roi: 141.4 }
      ]
    };

    const width = 940;
    const height = 200;
    const paddingBottom = 20;
    const paddingTop = 20;

    function generatePaths(points) {
      if (points.length < 2) return { path: '', area: '' };

      // Values map to bounding box
      const minVal = Math.min(...points.map(p => p.val), 0);
      const maxVal = Math.max(...points.map(p => p.val), 50);
      const range = maxVal - minVal;

      const mapped = points.map((p, i) => {
        const x = (i / (points.length - 1)) * width;
        const y = height - paddingBottom - ((p.val - minVal) / range) * (height - paddingTop - paddingBottom);
        return { x, y, data: p };
      });

      // Calculate baseline Y
      const zeroY = height - paddingBottom - ((0 - minVal) / range) * (height - paddingTop - paddingBottom);

      let pathD = `M ${mapped[0].x.toFixed(1)},${mapped[0].y.toFixed(1)}`;
      for (let i = 1; i < mapped.length; i++) {
        pathD += ` L ${mapped[i].x.toFixed(1)},${mapped[i].y.toFixed(1)}`;
      }

      const areaD = `${pathD} L ${width},${zeroY} L 0,${zeroY} Z`;

      return { path: pathD, area: areaD, mapped, zeroY };
    }

    function renderTrendChart(filterKey) {
      const pathEl = document.getElementById('chart-path');
      const areaEl = document.getElementById('chart-area');
      const nodesContainer = document.getElementById('chart-nodes');
      const baseline = document.getElementById('zero-baseline');
      const tooltip = document.getElementById('chart-tooltip');

      if (!pathEl || !areaEl || !nodesContainer) return;

      const dataset = CHART_DATA[filterKey];
      const { path, area, mapped, zeroY } = generatePaths(dataset);

      // Morph path and background area
      gsap.to(pathEl, { attr: { d: path }, duration: 0.5, ease: "power2.out" });
      gsap.to(areaEl, { attr: { d: area }, duration: 0.5, ease: "power2.out" });
      gsap.to(baseline, { attr: { y1: zeroY, y2: zeroY }, duration: 0.5, ease: "power2.out" });

      // Clean old nodes and render new interactive points
      nodesContainer.innerHTML = '';
      mapped.forEach(pt => {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('class', 'chart-tooltip-dot');
        circle.setAttribute('cx', pt.x);
        circle.setAttribute('cy', pt.y);
        circle.setAttribute('r', '4.5');

        circle.addEventListener('mouseenter', (e) => {
          tooltip.style.display = 'block';
          tooltip.style.left = `${pt.x}px`;
          tooltip.style.top = `${pt.y}px`;
          
          tooltip.querySelector('.date').innerText = pt.data.date;
          tooltip.querySelector('.pnl').innerText = `${pt.data.val >= 0 ? '+' : ''}$${pt.data.val.toFixed(2)}`;
          tooltip.querySelector('.pnl').style.color = pt.data.val >= 0 ? 'var(--accent)' : 'var(--loss)';
          tooltip.querySelectorAll('span')[2].innerText = `ROI: ${pt.data.roi.toFixed(1)}%`;
        });

        circle.addEventListener('mouseleave', () => {
          tooltip.style.display = 'none';
        });

        nodesContainer.appendChild(circle);
      });
    }

    // Bind filters
    const filterButtons = document.querySelectorAll('#timeframe-selector button');
    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.getAttribute('data-filter');
        renderTrendChart(filter);
      });
    });

    // Initial load
    renderTrendChart('all');
  </script>
</body>
</html>
