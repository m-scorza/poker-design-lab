<section class="page" id="page-sessions">

      <!-- Session Activity Calendar Heatmap -->
      <div class="card sessions-calendar-card">
        <div class="cal-h">
          <span class="kick accent">Frequency & volume calendar</span>
          <span class="note">density = volume · color = net result</span>
          <div class="legend">
            <span class="sw"><i class="sessions-legend-dot-loss1"></i>−$5+</span>
            <span class="sw"><i class="sessions-legend-dot-loss2"></i>loss</span>
            <span class="sw"><i class="cal-cell flat sessions-legend-dot-zero"></i>zero</span>
            <span class="sw"><i class="sessions-legend-dot-win1"></i>gain</span>
            <span class="sw"><i class="sessions-legend-dot-win2"></i>+$5+</span>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-month-row" id="cal-months"></div>
      </div>
      <div class="cal-tip" id="cal-tip"></div>

      <!-- Action Strip & Table -->
      <div class="card sessions-history-card">
        <div class="sessions-history-header">
          <span class="kick">Session history · volume timeline</span>
          <div class="sessions-export-actions">
            <button class="stat-trigger sessions-export-btn" id="btn-export-csv">Export CSV</button>
            <button class="stat-trigger sessions-export-btn" id="btn-export-pdf">Export PDF</button>
          </div>
        </div>

        <div class="timeline-row-editorial sessions-timeline-header-override">
          <span>Date</span><span>Session details</span><span>Buy-ins</span><span>bb/100</span><span>GTO compliance</span>
        </div>

        <!-- Rows + drawers rendered from state.sessions by sessions.js -->
        <div id="sessions-tbody"></div>

      </div>

      <!-- Export Modal Backdrop -->
      <div class="sessions-export-backdrop" id="export-backdrop">
        <div class="replay-modal sessions-export-modal-override">
          <div class="replay-modal-header">
            <span class="kick accent" id="export-modal-title">Exporting the ledger</span>
            <button class="replay-modal-close" id="btn-close-export">&times;</button>
          </div>
          <div class="sessions-export-body">
            <div class="export-progress-container sessions-export-progress-container" id="export-progress-area">
              <div class="session-bar-lbl sessions-bar-lbl-override">
                <span id="export-status-text" class="sessions-export-status-text">Compiling the hand history...</span>
                <span id="export-pct" class="sessions-export-pct">0%</span>
              </div>
              <div class="session-bar-track sessions-bar-track-override">
                <div class="session-bar-fill sessions-bar-fill-override" id="export-progress-bar"></div>
              </div>
            </div>

            <div class="terminal-log-window sessions-terminal-window" id="export-terminal-logs">
              <!-- Simulated compilation logs -->
            </div>

            <div id="export-success-msg" class="sessions-export-success-box">
              <div class="sessions-export-success-checkmark">✓</div>
              <p class="sessions-export-success-text">The ledger file is ready to download.</p>
              <button class="btn-download-file sessions-download-btn" id="btn-download-file">Download file</button>
            </div>
          </div>
        </div>
      </div>

    </section>
