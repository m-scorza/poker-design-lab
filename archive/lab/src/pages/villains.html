<section class="page" id="page-villains">

      <div class="villains-header-row">
        <h2 class="kick accent villains-header-title">Opponent profiles · predator vs. prey</h2>
        <span class="kick villains-count-label" id="villains-count-lbl">0 opponents tracked</span>
      </div>

      <div class="opponent-search-bar">
        <input type="text" id="villains-search-input" placeholder="Search opponent by name..."/>
        <div class="ranges-tab-menu villains-filter-dock-override" id="villains-filter-dock">
          <button class="ranges-tab-btn active" data-filter="all">All</button>
          <button class="ranges-tab-btn" data-filter="lag">LAG</button>
          <button class="ranges-tab-btn" data-filter="passive">Passive</button>
          <button class="ranges-tab-btn" data-filter="reg">Solid Reg</button>
        </div>
        <div class="villains-threat-legend">
          <span><i class="t-pred"></i>Predator</span>
          <span><i class="t-prey"></i>Prey</span>
          <span><i class="t-neutral"></i>Neutral</span>
        </div>
      </div>

      <div class="villains-main-layout">
        <!-- Opponents grid (left) -->
        <div class="opponents-cards-grid" id="villains-grid">
          <!-- Cards generated programmatically in JS -->
        </div>

        <!-- Detail panel (right) -->
        <div class="opponent-detail-card" id="villain-detail-panel">
          <div class="villains-empty-state">
            <div class="ico">🗂</div>
            <span class="lbl">Select an opponent to inspect the profile</span>
          </div>
        </div>
      </div>

    </section>
