<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1480, initial-scale=1" />
  <title>Element Showcase - Spinner Set</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050608;
      --panel: rgba(13, 17, 25, 0.5);
      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.15);
      --accent: #00F0FF;
      --accent-2: #00FF87;
      --fg: #f3f4f6;
      --fg-3: #8892b0;
      --fg-4: #5a607a;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Outfit', sans-serif;
      --sans: 'Inter', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 60px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .back-link { position: fixed; top: 20px; left: 20px; color: var(--fg-3); text-decoration: none; font-family: var(--mono); font-size: 11px; text-transform: uppercase; z-index: 100; }
    .back-link:hover { color: var(--accent); }
    .container { width: 100%; max-width: 760px; text-align: center; }
    h1 { font-family: var(--display); font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
    .sub { color: var(--fg-3); margin: 0 0 36px; font-size: 14px; }

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .cell {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 30px 16px 16px; display: flex; flex-direction: column; align-items: center; gap: 22px;
      min-height: 150px; justify-content: space-between;
    }
    .stage { height: 56px; display: grid; place-items: center; }
    .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-4); }

    /* 1 · ring */
    .ring { width: 38px; height: 38px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.08); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 2 · dual orbit dots */
    .orbit { width: 42px; height: 42px; position: relative; animation: spin 1.1s linear infinite; }
    .orbit::before, .orbit::after { content: ''; position: absolute; width: 9px; height: 9px; border-radius: 50%; }
    .orbit::before { top: 0; left: 50%; transform: translateX(-50%); background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .orbit::after { bottom: 0; left: 50%; transform: translateX(-50%); background: var(--accent-2); box-shadow: 0 0 10px var(--accent-2); }

    /* 3 · equalizer bars */
    .bars { display: flex; gap: 4px; align-items: flex-end; height: 34px; }
    .bars i { width: 5px; background: var(--accent); border-radius: 2px; animation: eq 0.9s ease-in-out infinite; }
    .bars i:nth-child(2) { animation-delay: 0.15s; background: var(--accent-2); }
    .bars i:nth-child(3) { animation-delay: 0.3s; }
    .bars i:nth-child(4) { animation-delay: 0.45s; background: var(--accent-2); }
    .bars i:nth-child(5) { animation-delay: 0.6s; }
    @keyframes eq { 0%, 100% { height: 8px; } 50% { height: 34px; } }

    /* 4 · pulse rings */
    .pulse { position: relative; width: 40px; height: 40px; }
    .pulse span { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--accent); animation: pulse 1.4s ease-out infinite; opacity: 0; }
    .pulse span:nth-child(2) { animation-delay: 0.7s; }
    @keyframes pulse { 0% { transform: scale(0.3); opacity: 0.8; } 100% { transform: scale(1); opacity: 0; } }
    .pulse .core { position: absolute; inset: 14px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: none; border: none; }

    /* 5 · three bounce dots */
    .bounce { display: flex; gap: 7px; }
    .bounce i { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); animation: bnc 0.7s ease-in-out infinite; }
    .bounce i:nth-child(2) { animation-delay: 0.12s; }
    .bounce i:nth-child(3) { animation-delay: 0.24s; }
    @keyframes bnc { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-12px); opacity: 1; } }

    /* 6 · conic sweep */
    .conic { width: 40px; height: 40px; border-radius: 50%; background: conic-gradient(from 0deg, transparent 0%, var(--accent) 85%); animation: spin 0.9s linear infinite; -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0); mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0); }

    /* 7 · square flip */
    .flip { width: 32px; height: 32px; background: var(--accent); border-radius: 5px; animation: flip 1.2s ease-in-out infinite; }
    @keyframes flip { 0% { transform: perspective(120px) rotateX(0) rotateY(0); } 50% { transform: perspective(120px) rotateX(180deg) rotateY(0); } 100% { transform: perspective(120px) rotateX(180deg) rotateY(180deg); } }

    /* 8 · chip spinner */
    .chip { width: 38px; height: 38px; border-radius: 50%; background: repeating-conic-gradient(var(--accent) 0deg 22.5deg, #0b0d12 22.5deg 45deg); border: 2px solid var(--accent-2); animation: spin 1.4s linear infinite; }
  </style>
</head>
<body>
  <a href="../../elements.html" class="back-link">← Showcase Catalog</a>
  <div class="container">
    <h1>Spinner Set</h1>
    <p class="sub">Eight indeterminate loaders — ring, orbit, equalizer, pulse, bounce, conic sweep, flip and a poker-chip spinner. All token-colored, pure CSS, GPU-friendly transforms.</p>

    <div class="grid">
      <div class="cell"><div class="stage"><div class="ring"></div></div><span class="label">Ring</span></div>
      <div class="cell"><div class="stage"><div class="orbit"></div></div><span class="label">Orbit</span></div>
      <div class="cell"><div class="stage"><div class="bars"><i></i><i></i><i></i><i></i><i></i></div></div><span class="label">Equalizer</span></div>
      <div class="cell"><div class="stage"><div class="pulse"><span></span><span></span><span class="core"></span></div></div><span class="label">Pulse</span></div>
      <div class="cell"><div class="stage"><div class="bounce"><i></i><i></i><i></i></div></div><span class="label">Bounce</span></div>
      <div class="cell"><div class="stage"><div class="conic"></div></div><span class="label">Conic sweep</span></div>
      <div class="cell"><div class="stage"><div class="flip"></div></div><span class="label">Flip</span></div>
      <div class="cell"><div class="stage"><div class="chip"></div></div><span class="label">Chip</span></div>
    </div>
  </div>
</body>
</html>
