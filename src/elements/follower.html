<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1480, initial-scale=1" />
  <title>Element Showcase - Cursor Follower Physics</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="../gsap.min.js"></script>
  <style>
    :root {
      --bg: #050608;
      --bg-2: #0b0d12;
      --bg-card: rgba(13, 17, 25, 0.65);
      --bg-card-hover: rgba(20, 26, 38, 0.75);
      --border: rgba(255, 255, 255, 0.05);
      --border-strong: rgba(255, 255, 255, 0.15);
      --accent: #00F0FF;
      --accent-2: #00FF87;
      --accent-soft: rgba(0, 240, 255, 0.06);
      --accent-glow: rgba(0, 240, 255, 0.25);
      --accent-line: rgba(0, 240, 255, 0.35);
      --loss: #FF3B6B;
      --loss-soft: rgba(255, 59, 107, 0.08);
      --fg: #f3f4f6;
      --fg-muted: #8892b0;
      --fg-dim: #3a3f50;
      --sans: 'Inter', -apple-system, sans-serif;
      --display: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    body {
      margin: 0; padding: 60px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow-x: hidden;
    }
    .container { max-width: 800px; width: 100%; text-align: center; z-index: 10; }
    h1 { font-family: var(--display); font-weight: 700; margin-bottom: 30px; letter-spacing: -0.02em; }
    .back-link { position: fixed; top: 20px; left: 20px; color: var(--fg-muted); text-decoration: none; font-family: var(--mono); font-size: 11px; text-transform: uppercase; z-index: 100; }
    .back-link:hover { color: var(--accent); }
    
  .cursor-follower { position: fixed; width: 20px; height: 20px; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); border: 1.5px solid var(--accent-line); border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%, -50%); mix-blend-mode: screen; will-change: transform, width, height; transition: width 0.3s cubic-bezier(0.19, 1, 0.22, 1), height 0.3s cubic-bezier(0.19, 1, 0.22, 1); }
  .hover-block { width: 200px; padding: 40px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; margin: 20px auto; cursor: pointer; font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; transition: border-color 0.3s; }
  .hover-block:hover { border-color: var(--accent); }
  
  </style>
</head>
<body>
  <a href="../elements_showcase.html" class="back-link">← Showcase Catalog</a>
  <div class="container">
    <h1>Cursor Follower Physics</h1>
    
  <div id="cursor-follower" class="cursor-follower"></div>
  <p style="color: var(--fg-muted); margin-bottom: 40px;">The ambient halo follower is physically offset and lags smoothly behind the real cursor.</p>
  <div class="hover-block">Hover Over Me</div>
  
  </div>
  <script>
    
  const follower = document.getElementById('cursor-follower');
  let mX = -100, mY = -100, fX = -100, fY = -100;
  document.addEventListener('mousemove', (e) => { mX = e.clientX; mY = e.clientY; });
  gsap.ticker.add(() => { fX += (mX - fX) * 0.15; fY += (mY - fY) * 0.15; gsap.set(follower, { x: fX, y: fY }); });
  const block = document.querySelector('.hover-block');
  block.addEventListener('mouseenter', () => gsap.to(follower, { width: 44, height: 44, duration: 0.3 }));
  block.addEventListener('mouseleave', () => gsap.to(follower, { width: 20, height: 20, duration: 0.3 }));
  
  </script>
</body>
</html>
