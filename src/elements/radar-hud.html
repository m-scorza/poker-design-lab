<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1480, initial-scale=1" />
  <title>Element Showcase - HUD Dials & Radar Sweep</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050608;
      --bg-2: #0b0d12;
      --bg-card: rgba(13, 17, 25, 0.65);
      --bg-card-hover: rgba(20, 26, 38, 0.75);
      --border: rgba(255, 255, 255, 0.05);
      --border-strong: rgba(255, 255, 255, 0.15);
      --accent: #00F0FF;
      --accent-2: #00FF87;
      --accent-soft: rgba(0, 240, 255, 0.06);
      --accent-glow: rgba(0, 240, 255, 0.25);
      --accent-line: rgba(0, 240, 255, 0.35);
      --loss: #FF3B6B;
      --loss-soft: rgba(255, 59, 107, 0.08);
      --fg: #f3f4f6;
      --fg-muted: #8892b0;
      --fg-dim: #3a3f50;
      --sans: 'Inter', -apple-system, sans-serif;
      --display: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    body {
      margin: 0; padding: 60px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow-x: hidden;
    }
    .container { max-width: 800px; width: 100%; text-align: center; z-index: 10; }
    h1 { font-family: var(--display); font-weight: 700; margin-bottom: 30px; letter-spacing: -0.02em; }
    .back-link { position: fixed; top: 20px; left: 20px; color: var(--fg-muted); text-decoration: none; font-family: var(--mono); font-size: 11px; text-transform: uppercase; z-index: 100; }
    .back-link:hover { color: var(--accent); }
    
  .hud-wrap { display: flex; gap: 40px; align-items: center; justify-content: center; margin-top: 40px; }
  .radar-svg { width: 140px; height: 140px; transform: rotate(-90deg); }
  .hud-ring { fill: none; stroke: var(--border-strong); stroke-width: 1.5; }
  .hud-ring-fill { fill: none; stroke: var(--accent); stroke-width: 2.8; stroke-linecap: round; stroke-dasharray: 263.8; stroke-dashoffset: 263.8; transition: stroke-dashoffset 1s ease; }
  .sweep-line { fill: none; stroke: url(#sweepGrad); stroke-width: 1.5; transform-origin: 70px 70px; }
  .trigger-btn { padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border); color: var(--fg); font-family: var(--mono); cursor: pointer; border-radius: 4px; display: block; margin: 10px auto; }
  .trigger-btn:hover { border-color: var(--accent); }
  
  </style>
</head>
<body>
  <a href="../../elements.html" class="back-link">← Showcase Catalog</a>
  <div class="container">
    <h1>HUD Dials & Radar Sweep</h1>
    
  <p style="color: var(--fg-muted);">Clicking stats activates circular concentric dials with an ambient sweep loop.</p>
  <div class="hud-wrap">
    <svg class="radar-svg">
      <defs>
        <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle class="hud-ring" cx="70" cy="70" r="42"/>
      <circle class="hud-ring-fill" id="demo-ring" cx="70" cy="70" r="42"/>
      <!-- Radar line -->
      <line id="radar-line" x1="70" y1="70" x2="70" y2="28" stroke="var(--accent)" stroke-width="1" />
    </svg>
  </div>
  <button class="trigger-btn" onclick="runRingDemo()">Animate Ring to 74%</button>
  
  </div>
  <script type="module">
  import gsap from 'gsap';
    
  gsap.to('#radar-line', { rotation: 360, transformOrigin: '70px 70px', repeat: -1, duration: 3, ease: "none" });
  function runRingDemo() {
    const ring = document.getElementById('demo-ring');
    const max = 263.8;
    const value = 74;
    const offset = max - (value / 100 * max);
    gsap.to(ring, { strokeDashoffset: offset, duration: 1.2, ease: "power2.out" });
  }
  
  </script>
</body>
</html>
