<section class="page" id="page-villains">

      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;">
        <h2 class="kick accent" style="margin:0;">Dossiês de oponentes · predador vs. presa</h2>
        <span class="kick" style="font-size: 11px;" id="villains-count-lbl">0 oponentes rastreados</span>
      </div>

      <div class="opponent-search-bar">
        <input type="text" id="villains-search-input" placeholder="Buscar oponente por nome..."/>
        <div class="ranges-tab-menu" id="villains-filter-dock" style="margin: 0;">
          <button class="ranges-tab-btn active" data-filter="all">Todos</button>
          <button class="ranges-tab-btn" data-filter="lag">LAG</button>
          <button class="ranges-tab-btn" data-filter="passive">Passivo</button>
          <button class="ranges-tab-btn" data-filter="reg">Reg Sólido</button>
        </div>
        <div class="villains-threat-legend">
          <span><i class="t-pred"></i>Predador</span>
          <span><i class="t-prey"></i>Presa</span>
          <span><i class="t-neutral"></i>Neutro</span>
        </div>
      </div>

      <div class="villains-main-layout">
        <!-- Opponents grid (left) -->
        <div class="opponents-cards-grid" id="villains-grid">
          <!-- Cards generated programmatically in JS -->
        </div>

        <!-- Detail panel (right) -->
        <div class="opponent-detail-card" id="villain-detail-panel">
          <div class="villains-empty-state">
            <div class="ico">🗂</div>
            <span class="lbl">Selecione um oponente para inspecionar o dossiê</span>
          </div>
        </div>
      </div>

    </section>
