<section class="page" id="page-ranges">
      
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 class="kick accent" style="margin:0;">Range compliance lab</h2>
        <div class="ranges-tab-menu">
          <button class="ranges-tab-btn active" data-mode="compliance">Compliance</button>
          <button class="ranges-tab-btn" data-mode="edit">Edit Range</button>
        </div>
      </div>
      
      <div class="ranges-main-layout">
        <!-- Range Matrix workspace -->
        <div class="card">
          <div class="position-select-grid" id="ranges-pos-selector">
            <!-- Programmatic button triggers UTG to BB -->
          </div>
          
          <div class="matrix-grid-box" id="ranges-matrix-grid" style="max-width: 440px; margin: 0 auto;">
            <!-- Grid generated programmatically -->
          </div>
          
          <div class="ranges-control-footer">
            <div class="ranges-swatch-info">
              <span><i class="play"></i>Played correctly</span>
              <span><i class="dev"></i>Deviation spots</span>
            </div>
            <span class="kick" id="ranges-combos-lbl">169 combos</span>
          </div>
        </div>
        
        <!-- Solver delta comparison list -->
        <div class="card solver-delta-card">
          <span class="kick accent">Solver Delta Validation</span>
          <div style="margin-top:14px;">
            <div class="solver-delta-row">
              <span class="pos-lbl">UTG Open</span>
              <div class="val-group"><span class="ours">15.2%</span><span class="solver">15.0%</span></div>
              <span class="delta-lbl wider">+0.2% OK</span>
            </div>
            <div class="solver-delta-row">
              <span class="pos-lbl">CO Open</span>
              <div class="val-group"><span class="ours">28.4%</span><span class="solver">26.0%</span></div>
              <span class="delta-lbl wider">+2.4% Wide</span>
            </div>
            <div class="solver-delta-row">
              <span class="pos-lbl">BTN Open</span>
              <div class="val-group"><span class="ours">58.0%</span><span class="solver">48.0%</span></div>
              <span class="delta-lbl tighter">+10.0% Wide</span>
            </div>
            <div class="solver-delta-row">
              <span class="pos-lbl">SB Open</span>
              <div class="val-group"><span class="ours">38.0%</span><span class="solver">40.0%</span></div>
              <span class="delta-lbl tighter">-2.0% Tight</span>
            </div>
          </div>
        </div>
      </div>
    
    </section>
