<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1480, initial-scale=1" />
  <title>Element Showcase - Text Scramble Angle Graph</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="../gsap.min.js"></script>
  <style>
    :root {
      --bg: #050608;
      --bg-2: #0b0d12;
      --bg-card: rgba(13, 17, 25, 0.65);
      --bg-card-hover: rgba(20, 26, 38, 0.75);
      --border: rgba(255, 255, 255, 0.05);
      --border-strong: rgba(255, 255, 255, 0.15);
      --accent: #00F0FF;
      --accent-2: #00FF87;
      --accent-soft: rgba(0, 240, 255, 0.06);
      --accent-glow: rgba(0, 240, 255, 0.25);
      --accent-line: rgba(0, 240, 255, 0.35);
      --loss: #FF3B6B;
      --loss-soft: rgba(255, 59, 107, 0.08);
      --fg: #f3f4f6;
      --fg-muted: #8892b0;
      --fg-dim: #3a3f50;
      --sans: 'Inter', -apple-system, sans-serif;
      --display: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    body {
      margin: 0; padding: 60px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow-x: hidden;
    }
    .container { max-width: 800px; width: 100%; text-align: center; z-index: 10; }
    h1 { font-family: var(--display); font-weight: 700; margin-bottom: 30px; letter-spacing: -0.02em; }
    .back-link { position: fixed; top: 20px; left: 20px; color: var(--fg-muted); text-decoration: none; font-family: var(--mono); font-size: 11px; text-transform: uppercase; z-index: 100; }
    .back-link:hover { color: var(--accent); }
    
  #scramble-title { font-family: var(--display); font-size: 40px; font-weight: 800; margin-top: 40px; letter-spacing: -0.02em; height: 60px; }
  .scramble-btn { padding: 12px 24px; background: var(--bg-2); border: 1px solid var(--border-strong); color: var(--fg); font-family: var(--mono); font-size: 11px; text-transform: uppercase; cursor: pointer; border-radius: 6px; }
  .scramble-btn:hover { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-soft); }
  
  </style>
</head>
<body>
  <a href="../elements_showcase.html" class="back-link">← Showcase Catalog</a>
  <div class="container">
    <h1>Text Scramble Angle Graph</h1>
    
  <p style="color: var(--fg-muted);">Triggering a scramble morphs randomized glyphs into target readable text.</p>
  <div id="scramble-title">TACTICAL SCRAMBLE</div>
  <button class="scramble-btn" onclick="triggerDemo()">Trigger Scramble</button>
  
  </div>
  <script>
    
  function scrambleText(elementId, finalString, duration = 0.8) {
    const el = document.getElementById(elementId);
    if (!el) return;
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@+-./";
    const length = finalString.length;
    let frame = 0;
    const totalFrames = duration * 60;
    const interval = setInterval(() => {
      let currentString = "";
      for (let i = 0; i < length; i++) {
        if (Math.random() < frame / totalFrames) {
          currentString += finalString[i];
        } else {
          currentString += chars[Math.floor(Math.random() * chars.length)];
        }
      }
      el.innerText = currentString;
      frame++;
      if (frame >= totalFrames) { clearInterval(interval); el.innerText = finalString; }
    }, 1000 / 60);
  }
  function triggerDemo() {
    scrambleText('scramble-title', 'TELEMETRY SECURED', 0.8);
  }
  
  </script>
</body>
</html>
