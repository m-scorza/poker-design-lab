<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1480, initial-scale=1" />
  <title>Modular Prototyping - Arena</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="../gsap.min.js"></script>
  <style>
    /* Injected layout CSS for standalone testing */
    :root {
      --bg: #06070a;
      --bg-2: #0b0c10;
      --bg-card: rgba(13, 16, 23, 0.65);
      --bg-card-hover: rgba(20, 24, 33, 0.75);
      --bg-input: #12131a;
      --border: rgba(255, 255, 255, 0.05);
      --border-strong: rgba(255, 255, 255, 0.15);
      --accent: #00F0FF;
      --accent-2: #00FF87;
      --accent-soft: rgba(0, 240, 255, 0.06);
      --accent-glow: rgba(0, 240, 255, 0.25);
      --accent-line: rgba(0, 240, 255, 0.35);
      --loss: #FF3B6B;
      --loss-soft: rgba(255, 92, 138, 0.08);
      --loss-line: rgba(255, 92, 138, 0.35);
      --fg: #f3f4f6;
      --fg-muted: #8892b0;
      --fg-dim: #3a3f50;
      --sans: 'Inter', -apple-system, sans-serif;
      --display: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.5);
    }
    body {
      margin: 0; padding: 40px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      min-height: 100vh;
    }
    /* Embed actual extracted styles below */
    /* STYLES_INJECT_PLACEHOLDER */
  </style>
</head>
<body>
  <div style="max-width: 1480px; margin: 0 auto;">
    <section class="page active" id="page-arena">
      
      <div class="arena-grid">
        <div class="hologram-viewport" id="arena-stage">
          
          <!-- Trainer status banner -->
          <div style="display:flex; justify-content:space-between; align-items:center; z-index: 10;">
            <span class="kick accent">Trainer Drill: Fault Fixer</span>
            <div class="kick">Score: <b style="color:var(--accent);" id="arena-score">0 / 0</b></div>
          </div>
          
          <!-- 3D Felt Arena -->
          <div class="hologram-stage-3d">
            <div class="hologram-felt-3d" id="arena-felt"></div>
            <canvas id="arena-felt-canvas"></canvas>
            
            <!-- Dynamic feedback popup -->
            <div class="trainer-feedback-overlay" id="trainer-feedback">
              <h4 id="feedback-title">CORRECT</h4>
              <p id="feedback-desc">Standard preflop open.</p>
            </div>
            
            <button class="hologram-seat seat-1" data-seat="1"><span class="name">UTG (Seat 1)</span><span class="chips">100bb</span></button>
            <button class="hologram-seat seat-2" data-seat="2"><span class="name">MP (Seat 2)</span><span class="chips">78bb</span></button>
            <button class="hologram-seat seat-3" data-seat="3"><span class="name">CO (Seat 3)</span><span class="chips">52bb</span></button>
            <button class="hologram-seat hero seat-4" data-seat="4"><span class="name">BTN (Hero)</span><span class="chips">100bb</span></button>
            <button class="hologram-seat seat-5" data-seat="5"><span class="name">SB (Seat 5)</span><span class="chips">32bb</span></button>
            <button class="hologram-seat seat-6" data-seat="6"><span class="name">BB (Seat 6)</span><span class="chips">40bb</span></button>
            
            <div class="center-pot-box">
              <span class="l">Pot</span>
              <div class="v">1.5bb</div>
            </div>
          </div>
          
          <!-- Action Buttons -->
          <div class="trainer-actions-wrap">
            <button class="btn-trainer-act" data-act="fold">Fold</button>
            <button class="btn-trainer-act" data-act="call">Call</button>
            <button class="btn-trainer-act" data-act="raise">Raise</button>
          </div>
          
        </div>
        
        <div class="card" style="display:flex; flex-direction:column; justify-content:space-between;">
          <div>
            <span class="kick accent">Training telemetry</span>
            <h3 style="font-family:var(--display); margin:12px 0 6px;">Fault Fixer</h3>
            <p style="font-size:12px; line-height:1.55; color:var(--fg-muted); margin:0;">
              This drill presents spots from your imported hands where you previously made GTO deviations. Master them to fix leaks.
            </p>
          </div>
          
          <div style="border-top:1px solid var(--border); padding-top:14px;">
            <span class="kick">Drill state</span>
            <div style="font-family:var(--mono); font-size:11.5px; margin-top:6px; line-height:1.6;">
              Current spot: <b style="color:var(--accent);">BTN RFI</b><br>
              Hand dealt: <b id="trainer-current-hand">AA</b>
            </div>
          </div>
        </div>
      </div>
    
    </section>
  </div>
  
  <script>
    // Local script placeholder for standalone pages
    /* SCRIPTS_INJECT_PLACEHOLDER */
  </script>
</body>
</html>
